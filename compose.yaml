services:
  api:
    build:
      context: .
      dockerfile: src/main/docker/Dockerfile.jvm
    image: quarkus-template:local
    ports:
      - "8080:8080"
    environment:
      DD_ENV: ${DD_ENV:-local}
      DD_SERVICE: ${DD_SERVICE:-quarkus-template}
      DD_VERSION: ${DD_VERSION:-1.0.0-SNAPSHOT}
      QUARKUS_OTEL_EXPORTER_OTLP_ENDPOINT: ${QUARKUS_OTEL_EXPORTER_OTLP_ENDPOINT:-http://datadog-agent:4317}
      QUARKUS_OTEL_SDK_DISABLED: ${QUARKUS_OTEL_SDK_DISABLED:-true}

  datadog-agent:
    image: datadog/agent:7
    profiles:
      - observability
    ports:
      - "8126:8126"
      - "4317:4317"
      - "4318:4318"
    environment:
      DD_API_KEY: ${DD_API_KEY:-}
      DD_APM_ENABLED: "true"
      DD_DOGSTATSD_NON_LOCAL_TRAFFIC: "true"
      DD_LOGS_ENABLED: "false"
      DD_OTLP_CONFIG_RECEIVER_PROTOCOLS_GRPC_ENDPOINT: "0.0.0.0:4317"
      DD_OTLP_CONFIG_RECEIVER_PROTOCOLS_HTTP_ENDPOINT: "0.0.0.0:4318"
      DD_SITE: ${DD_SITE:-datadoghq.com}

