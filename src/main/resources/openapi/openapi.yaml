openapi: 3.0.3
info:
  title: Customer Profile API
  version: 1.0.0
  description: API to retrieve aggregated customer profiles, including exposures across various products.
  contact:
    name: API Support
    email: support@api.example.com
servers:
  - url: https://p2-dev.api.example.com
    description: Dev (P-2) Server
  - url: https://p1-qa.api.example.com
    description: QA (P-1) Server
  - url: https://api.example.com
    description: Production server
tags:
  - name: CustomerProfile
    description: Operations related to customer profiles
paths:
  /api/customers/{customerId}/profile:
    get:
      description: Retrieve an aggregated customer profile, including exposures across various products.
      tags:
        - CustomerProfile
      summary: Get an aggregated customer profile
      operationId: getCustomerProfile
      parameters:
        - name: customerId
          in: path
          required: true
          description: Opaque customer identifier
          schema:
            type: string
            maxLength: 64
          example: "CUST-12345"
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomerProfileView'
              example:
                customerId: "CUST-12345"
                fullName: "John Smith"
                segment: "PRIVATE"
                baseCurrency: "USD"
                availableBalance: 1250000.50
                totalExposure: 3500000.00
                exposures:
                  - productCode: "MMF"
                    currency: "USD"
                    notional: 500000.00
                  - productCode: "LOAN"
                    currency: "EUR"
                    notional: 2000000.00
                  - productCode: "DEPOSIT"
                    currency: "GBP"
                    notional: 1000000.00
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
              example:
                code: "NOT_FOUND"
                message: "Customer profile not found for customerId: CUST-12345"
                violations: []
    put:
      description: Update an existing customer profile with the provided fields.
      tags:
        - CustomerProfile
      summary: Update a customer profile
      operationId: updateCustomerProfile
      parameters:
        - name: customerId
          in: path
          required: true
          description: Opaque customer identifier
          schema:
            type: string
            maxLength: 64
          example: "CUST-12345"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateCustomerProfileRequest'
            example:
              customerId: "CUST-12345"
              givenName: "Jane"
              familyName: "Doe"
              segment: "INSTITUTIONAL"
              baseCurrency: "EUR"
              availableBalance: 5000000.00
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomerProfileView'
              example:
                customerId: "CUST-12345"
                fullName: "Jane Doe"
                segment: "INSTITUTIONAL"
                baseCurrency: "EUR"
                availableBalance: 5000000.00
                totalExposure: 7500000.00
                exposures:
                  - productCode: "MMF"
                    currency: "EUR"
                    notional: 2500000.00
                  - productCode: "DERIVATIVE"
                    currency: "USD"
                    notional: 5000000.00
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
              example:
                code: "VALIDATION_ERROR"
                message: "Request validation failed"
                violations:
                  - field: "availableBalance"
                    message: "must be greater than or equal to 0"
                  - field: "baseCurrency"
                    message: "must be a valid ISO 4217 currency code"
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
              example:
                code: "NOT_FOUND"
                message: "Customer profile not found for customerId: CUST-12345"
                violations: []
  /api/customers/profile:
    post:
      description: Create a new customer profile.
      tags:
        - CustomerProfile
      summary: Create a customer profile
      operationId: createCustomerProfile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCustomerProfileRequest'
            example:
              customerId: "CUST-67890"
              givenName: "Alice"
              familyName: "Johnson"
              segment: "RETAIL"
              baseCurrency: "GBP"
              availableBalance: 75000.25
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomerProfileView'
              example:
                customerId: "CUST-67890"
                fullName: "Alice Johnson"
                segment: "RETAIL"
                baseCurrency: "GBP"
                availableBalance: 75000.25
                totalExposure: 75000.25
                exposures:
                  - productCode: "DEPOSIT"
                    currency: "GBP"
                    notional: 75000.25
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
              example:
                code: "VALIDATION_ERROR"
                message: "Request validation failed"
                violations:
                  - field: "customerId"
                    message: "must not be blank"
                  - field: "baseCurrency"
                    message: "must be a valid ISO 4217 currency code"
        '409':
          description: Conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
              example:
                code: "CONFLICT"
                message: "Customer profile already exists for customerId: CUST-67890"
                violations: []
components:
  schemas:
    CreateCustomerProfileRequest:
      type: object
      required:
        - customerId
        - givenName
        - familyName
        - segment
        - baseCurrency
        - availableBalance
      properties:
        customerId:
          type: string
          minLength: 1
          maxLength: 64
        givenName:
          type: string
          minLength: 1
        familyName:
          type: string
          minLength: 1
        segment:
          type: string
          minLength: 1
        baseCurrency:
          type: string
          minLength: 3
          maxLength: 3
          pattern: '^[A-Z]{3}$'
        availableBalance:
          type: number
          minimum: 0
      example:
        customerId: "CUST-67890"
        givenName: "Alice"
        familyName: "Johnson"
        segment: "RETAIL"
        baseCurrency: "GBP"
        availableBalance: 75000.25
    UpdateCustomerProfileRequest:
      type: object
      required:
        - customerId
      properties:
        customerId:
          type: string
          minLength: 1
          maxLength: 64
        givenName:
          type: string
          minLength: 1
        familyName:
          type: string
          minLength: 1
        segment:
          type: string
          minLength: 1
        baseCurrency:
          type: string
          minLength: 3
          maxLength: 3
          pattern: '^[A-Z]{3}$'
        availableBalance:
          type: number
          minimum: 0
      example:
        customerId: "CUST-12345"
        givenName: "Jane"
        familyName: "Doe"
        segment: "INSTITUTIONAL"
        baseCurrency: "EUR"
        availableBalance: 5000000.00
    ApiErrorResponse:
      type: object
      required:
        - code
        - message
        - violations
      properties:
        code:
          type: string
        message:
          type: string
        violations:
          type: array
          items:
            $ref: '#/components/schemas/ApiViolation'
      example:
        code: "VALIDATION_ERROR"
        message: "Request validation failed"
        violations:
          - field: "availableBalance"
            message: "must be greater than or equal to 0"
          - field: "baseCurrency"
            message: "must be a valid ISO 4217 currency code"
    ApiViolation:
      type: object
      required:
        - field
        - message
      properties:
        field:
          type: string
        message:
          type: string
      example:
        field: "availableBalance"
        message: "must be greater than or equal to 0"
    CustomerProfileView:
      type: object
      required:
        - customerId
        - exposures
      properties:
        customerId:
          type: string
        fullName:
          type: string
        segment:
          type: string
        baseCurrency:
          type: string
        availableBalance:
          type: number
        totalExposure:
          type: number
        exposures:
          type: array
          items:
            $ref: '#/components/schemas/ProductExposure'
      example:
        customerId: "CUST-12345"
        fullName: "John Smith"
        segment: "PRIVATE"
        baseCurrency: "USD"
        availableBalance: 1250000.50
        totalExposure: 3500000.00
        exposures:
          - productCode: "MMF"
            currency: "USD"
            notional: 500000.00
          - productCode: "LOAN"
            currency: "EUR"
            notional: 2000000.00
          - productCode: "DEPOSIT"
            currency: "GBP"
            notional: 1000000.00
    ProductExposure:
      type: object
      required:
        - productCode
        - currency
        - notional
      properties:
        productCode:
          type: string
        currency:
          type: string
        notional:
          type: number
      example:
        productCode: "MMF"
        currency: "USD"
        notional: 500000.00
