quarkus.application.name=quarkus-template
quarkus.http.port=${HTTP_PORT:8080}

# JSON logging for log aggregator ingestion (ELK, Splunk, etc.)
quarkus.log.console.json=true
quarkus.log.console.json.pretty-print=false
quarkus.log.console.json.log-category-key=logger
quarkus.log.console.json.keys.level=level
quarkus.log.console.json.keys.message=message
quarkus.log.console.json.keys.timestamp=timestamp
quarkus.log.console.json.keys.logger=logger
quarkus.log.console.json.keys.thread=thread
quarkus.log.console.json.keys.span-id=spanId
quarkus.log.console.json.keys.trace-id=traceId

# Include MDC context data (traceId, spanId) in JSON output
quarkus.log.console.json.include-mdc=true

# Use human-readable format in development for easier debugging
%dev.quarkus.log.console.json=false
%dev.quarkus.log.console.format=%d{HH:mm:ss,SSS} %-5p traceId=%X{traceId}, spanId=%X{spanId} [%c{1.}] %s%e%n

# HTTP access log configuration
quarkus.http.access-log.enabled=true
quarkus.http.access-log.pattern=%h %l %u %t "%r" %s %b "%{i,Referer}" \
  "%{i,User-Agent}" traceId=%X{traceId} spanId=%X{spanId}

quarkus.otel.enabled=true
quarkus.otel.traces.enabled=true
quarkus.otel.metrics.enabled=false
quarkus.otel.logs.enabled=false
quarkus.otel.sdk.disabled=${QUARKUS_OTEL_SDK_DISABLED:true}
quarkus.otel.exporter.otlp.enabled=true
quarkus.otel.exporter.otlp.endpoint=${QUARKUS_OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4317}
quarkus.otel.service.name=${DD_SERVICE:${quarkus.application.name}}
quarkus.otel.resource.attributes=deployment.environment=${DD_ENV:local},service.version=${DD_VERSION:1.0.0-SNAPSHOT}

%dev.quarkus.smallrye-graphql.ui.always-include=true
%test.quarkus.smallrye-graphql.ui.always-include=true
%dev.quarkus.swagger-ui.always-include=true
%test.quarkus.swagger-ui.always-include=true

# GraphQL error handling - include exception type in error extensions
quarkus.smallrye-graphql.error-extension-fields=exception

# Downstream GraphQL client configuration
# Configure the URL for the downstream Customer Core GraphQL service
# quarkus.smallrye-graphql-client.customer-core.url=http://localhost:8081/graphql
# quarkus.smallrye-graphql-client.customer-core.token=<auth-token>

# Downstream REST client configuration
# Customer Core REST Client - replace StubCustomerCoreGateway with real HTTP calls
customer-core.base-url=http://localhost:8081
%dev.customer-core.base-url=http://localhost:8081
%test.customer-core.base-url=http://localhost:8080

# Exposure Service REST Client - replace StubExposureGateway with real HTTP calls
exposure-service.base-url=http://localhost:8082
%dev.exposure-service.base-url=http://localhost:8082
%test.exposure-service.base-url=http://localhost:8080

# REST Client configuration (optional - adds resilience)
# See: https://quarkus.io/guides/rest-client for advanced configuration
# customer-core/mp-fault-tolerance/retry/enabled=true
# customer-core/mp-fault-tolerance/timeout/enabled=true
# customer-core/mp-fault-tolerance/circuit-breaker/enabled=true
